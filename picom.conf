# Configuración Glass v13 - BlackArch
backend = "glx";
use-damage = true;
vsync = true;

# Transparencias (Glass effect)
active-opacity = 0.85;
inactive-opacity = 0.75;
frame-opacity = 0.8;

# Difuminado (Blur)
blur-background = true;
blur-method = "dual_kawase";
blur-strength = 6;

# Bordes Redondeados (Como en tu imagen)
corner-radius = 12;

# Sombras
shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.5;

# Reglas para que el Dock/Panel no sea transparente
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'firefox'",
  "class_g = 'Google-chrome'",
  "class_g = 'Brave-browser'",
  "_GTK_FRAME_EXTENTS@:c"
];
